<main class="auth">
  <section class="auth__panel">
    <div class="auth__brand">
      <span class="auth__mark">KV</span>
      <div>
        <p>KnowledgeVault</p>
        <h1>{{ mode() === 'login' ? 'Welcome back' : 'Create your vault' }}</h1>
      </div>
    </div>

    <div class="segment">
      <button type="button" [class.is-active]="mode() === 'login'" (click)="setMode('login')">Sign in</button>
      <button type="button" [class.is-active]="mode() === 'register'" (click)="setMode('register')">Register</button>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()">
      @if (mode() === 'register') {
        <label>
          User name
          <input type="text" formControlName="userName" autocomplete="username" />
        </label>

        <label>
          Email
          <input type="email" formControlName="email" autocomplete="email" />
        </label>
      } @else {
        <label>
          User name or email
          <input
            type="text"
            formControlName="userNameOrEmail"
            autocomplete="username"
            [attr.aria-invalid]="form.controls.userNameOrEmail.touched && form.controls.userNameOrEmail.invalid"
          />
          @if (form.controls.userNameOrEmail.touched && form.controls.userNameOrEmail.hasError('required')) {
            <small class="field-error">Enter your user name or email.</small>
          }
        </label>
      }

      <label>
        Password
        <input
          type="password"
          formControlName="password"
          autocomplete="current-password"
          [attr.aria-invalid]="form.controls.password.touched && form.controls.password.invalid"
        />
        @if (!form.controls.password.touched || form.controls.password.valid) {
          <small class="field-hint">Password must be at least 8 characters.</small>
        } @else if (form.controls.password.hasError('required')) {
          <small class="field-error">Enter your password.</small>
        } @else if (form.controls.password.hasError('minlength')) {
          <small class="field-error">Password must be at least 8 characters.</small>
        }
      </label>

      @if (error()) {
        <p class="alert">{{ error() }}</p>
      }

      <button class="primary" type="submit" [disabled]="loading()">
        @if (loading()) {
          <app-loading-indicator label="Please wait" />
        } @else {
          {{ mode() === 'login' ? 'Sign in' : 'Create account' }}
        }
      </button>
    </form>
  </section>
</main>
