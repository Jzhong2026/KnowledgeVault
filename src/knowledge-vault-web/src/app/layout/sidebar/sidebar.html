<aside class="sidebar" [class.sidebar--collapsed]="collapsed()">
  <div class="sidebar__header">
    <a class="brand" routerLink="/" aria-label="KnowledgeVault home">
      <img class="brand__mark" src="knowledge-vault-icon.svg" alt="" width="42" height="42">
      <span class="brand__copy">
        <strong>KnowledgeVault</strong>
        <small>Project &amp; personal documents</small>
      </span>
    </a>

    <button
      class="collapse-button"
      type="button"
      [attr.aria-label]="collapsed() ? 'Expand navigation' : 'Collapse navigation'"
      [attr.title]="collapsed() ? 'Expand navigation' : 'Collapse navigation'"
      (click)="toggle()"
    >
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M9 6l6 6-6 6M4 4h16v16H4z" />
      </svg>
    </button>
  </div>

  <nav class="nav" aria-label="Primary navigation">
    <div class="nav__group">
      <span class="nav__heading">Workspace</span>
      <a routerLink="/dashboard" routerLinkActive="is-active" title="Dashboard">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 4h6v6H4zM14 4h6v6h-6zM4 14h6v6H4zM14 14h6v6h-6z" /></svg>
        <span>Dashboard</span>
      </a>
      <a routerLink="/projects" routerLinkActive="is-active" title="Project Documents">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 7h7l2 2h9v10H3zM3 7V5h7l2 2" /></svg>
        <span>Project Documents</span>
      </a>
      <a routerLink="/knowledge" routerLinkActive="is-active" title="Personal Documents">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 3h9l4 4v14H6zM15 3v5h4M9 12h7M9 16h7" /></svg>
        <span>Personal Documents</span>
      </a>
    </div>

    <div class="nav__group">
      <span class="nav__heading">Settings</span>
      <a routerLink="/settings/categories" routerLinkActive="is-active" title="Categories">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5h6v6H4zM14 5h6v6h-6zM4 15h6v4H4zM14 15h6v4h-6z" /></svg>
        <span>Categories</span>
      </a>
      <a routerLink="/settings/tags" routerLinkActive="is-active" title="Tags">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 4h8l8 8-8 8-8-8zM9 9h.01" /></svg>
        <span>Tags</span>
      </a>
    </div>
  </nav>

  <div class="sidebar__footer">
    <span class="status-dot" aria-hidden="true"></span>
    <span>Local workspace</span>
  </div>
</aside>
