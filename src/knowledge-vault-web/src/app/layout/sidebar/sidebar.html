<aside class="sidebar" [class.sidebar--collapsed]="collapsed()">
  <div class="sidebar__header">
    <a class="brand" routerLink="/" aria-label="KnowledgeVault home">
      <img class="brand__mark" src="knowledge-vault-icon.svg" alt="" width="42" height="42" />
      <span class="brand__copy">
        <strong>KnowledgeVault</strong>
        <small>Project Knowledge Hub</small>
      </span>
    </a>

    <button
      class="collapse-button"
      type="button"
      [attr.aria-label]="collapsed() ? 'Expand navigation' : 'Collapse navigation'"
      [attr.title]="collapsed() ? 'Expand navigation' : 'Collapse navigation'"
      (click)="toggle()"
    >
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M9 6l6 6-6 6M4 4h16v16H4z" />
      </svg>
    </button>
  </div>

  <nav class="nav" aria-label="Primary navigation">
    <div class="nav__group nav__group--dashboard">
      <a routerLink="/dashboard" routerLinkActive="is-active" title="Dashboard">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4 4h6v6H4zM14 4h6v6h-6zM4 14h6v6H4zM14 14h6v6h-6z" />
        </svg>
        <span>Dashboard</span>
      </a>
    </div>

    <div class="nav__section" role="group" aria-labelledby="projects-navigation">
      <div class="nav__parent" id="projects-navigation">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M3 7h7l2 2h9v10H3zM3 7V5h7l2 2" />
        </svg>
        <span>Projects</span>
      </div>
      <div class="nav__children">
        <a routerLink="/projects" routerLinkActive="is-active" title="Project Management">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 5h16v14H4zM8 3v4M16 3v4M8 11h3M13 11h3M8 15h3M13 15h3" />
          </svg>
          <span>Project Management</span>
        </a>
        <a routerLink="/project-documents" routerLinkActive="is-active" title="Project Documents">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M6 3h9l4 4v14H6zM15 3v5h4M9 12h7M9 16h7" />
          </svg>
          <span>Documents</span>
        </a>
      </div>
    </div>

    <div class="nav__section" role="group" aria-labelledby="personal-navigation">
      <div class="nav__parent" id="personal-navigation">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 3a4 4 0 1 1 0 8 4 4 0 0 1 0-8zM5 21v-2a7 7 0 0 1 14 0v2" />
        </svg>
        <span>My Workspace</span>
      </div>
      <div class="nav__children">
        <a routerLink="/knowledge" routerLinkActive="is-active" title="My Documents">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M6 3h9l4 4v14H6zM15 3v5h4M9 12h7M9 16h7" />
          </svg>
          <span>Documents</span>
        </a>
      </div>
    </div>

    <div class="nav__group">
      <span class="nav__heading">Settings</span>
      <a routerLink="/settings/categories" routerLinkActive="is-active" title="Categories">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4 5h6v6H4zM14 5h6v6h-6zM4 15h6v4H4zM14 15h6v4h-6z" />
        </svg>
        <span>Categories</span>
      </a>
      <a routerLink="/settings/tags" routerLinkActive="is-active" title="Tags">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 4h8l8 8-8 8-8-8zM9 9h.01" /></svg>
        <span>Tags</span>
      </a>
    </div>
  </nav>

  <div class="sidebar__footer">
    <span class="status-dot" aria-hidden="true"></span>
    <span>Workspace online</span>
  </div>
</aside>
