<header class="topbar">
  <div>
    <p class="eyebrow">Workspace</p>
    <h1>Personal Knowledge Vault</h1>
  </div>

  <div class="user">
    <span class="avatar">{{ initials() }}</span>
    <span class="user__meta">
      <strong>{{ user()?.userName }}</strong>
      <small>{{ user()?.email }}</small>
    </span>
    <button class="signout-button" type="button" (click)="logout()">Sign out</button>
  </div>
</header>
